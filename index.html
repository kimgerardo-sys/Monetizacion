<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgoraPolis Búnker</title>
    
    <!-- Meta Tags para comportamiento de App Nativa (iOS & Android) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Enlace del Manifiesto PWA dinámico (Data URI) -->
    <link rel="manifest" id="pwa-manifest">
    
    <!-- CDNs Limpios e independientes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        .glass-header { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }
        /* Ocultar barra de scroll visualmente */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col pb-24 antialiased">

    <!-- CABECERA -->
    <header class="fixed top-0 left-0 right-0 z-40 glass-header border-b border-slate-800/60 px-4 py-3.5">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center border border-indigo-500/20 shadow-lg shadow-indigo-500/10">
                    <i data-lucide="shield" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-tight text-white leading-tight">AgoraPolis</h1>
                    <p id="current-tab-title" class="text-[10px] text-indigo-400 font-bold tracking-wider uppercase leading-none mt-0.5">Periodismo</p>
                </div>
            </div>
            
            <!-- CONTADOR LOCAL DE ACCIONES CUMPLIDAS -->
            <div class="flex items-center gap-2">
                <div class="bg-slate-800/80 border border-slate-700/50 rounded-xl px-3 h-10 flex items-center gap-2 shadow-inner">
                    <i data-lucide="star" class="w-4 h-4 text-amber-400 fill-amber-400"></i>
                    <div class="text-left">
                        <p class="text-[8px] font-bold text-slate-400 uppercase leading-none">Puntos</p>
                        <p id="task-counter" class="text-xs font-black text-white leading-none mt-0.5">0</p>
                    </div>
                </div>
                <button id="sync-btn" onclick="fetchData()" class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700/80 flex items-center justify-center active:scale-95 transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-300"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- ALERTA SMART FLOTANTE -->
    <div id="toast" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800/95 text-emerald-400 text-xs font-bold px-4 py-3 rounded-xl shadow-2xl border border-emerald-500/30 flex items-center gap-2 transition-all backdrop-blur-md">
        <i data-lucide="check-circle" class="w-4 h-4"></i> <span id="toast-text">Completado</span>
    </div>

    <!-- CONTENEDOR DE CONTENIDO -->
    <main class="flex-1 max-w-xl w-full mx-auto px-4 pt-24 space-y-4">
        
        <!-- BARRA DE BÚSQUEDA INTEGRADA -->
        <div id="search-container" class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i data-lucide="search" class="w-4 h-4 text-slate-500"></i>
            </span>
            <input type="text" id="search-bar" oninput="renderFeed()" placeholder="Buscar reportes o palabras clave..." 
                class="w-full h-11 pl-10 pr-4 bg-slate-800/40 border border-slate-800 rounded-xl text-sm placeholder-slate-500 text-white focus:outline-none focus:border-indigo-500 transition-all">
        </div>

        <!-- RECIPIENTE DINÁMICO DE TARJETAS -->
        <div id="feed-container" class="space-y-4">
            <!-- Esqueleto de Carga Base -->
            <div class="animate-pulse space-y-4">
                <div class="h-32 bg-slate-800/40 rounded-2xl border border-slate-800"></div>
            </div>
        </div>
    </main>

    <!-- NAVEGACIÓN ESTILO APP (Áreas de interacción > 44px optimizadas para el pulgar) -->
    <nav class="fixed bottom-0 left-0 right-0 glass-header border-t border-slate-800/60 z-40 px-2 shadow-2xl">
        <div class="max-w-xl mx-auto flex justify-around items-center h-16">
            <button onclick="switchTab('Periodismo')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-indigo-400" data-section="Periodismo">
                <i data-lucide="newspaper" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Periodismo</span>
            </button>
            <button onclick="switchTab('Tendencias')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-slate-400" data-section="Tendencias">
                <i data-lucide="trending-up" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Tendencias</span>
            </button>
            <button onclick="switchTab('Estrategia')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-slate-400" data-section="Estrategia">
                <i data-lucide="zap" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Estrategia</span>
            </button>
            <button onclick="switchTab('Materiales')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-slate-400" data-section="Materiales">
                <i data-lucide="folder" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Materiales</span>
            </button>
            <button onclick="switchTab('Mapas')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-slate-400" data-section="Mapas">
                <i data-lucide="map" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Mapas</span>
            </button>
        </div>
    </nav>

    <!-- VISOR IN-APP MODAL PARA EVITAR SALIR DE LA PWA -->
    <div id="reader-modal" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-md flex flex-col justify-end sm:justify-center p-0">
        <div class="bg-slate-900 w-full max-w-xl mx-auto h-[92vh] rounded-t-3xl border-t border-slate-800 flex flex-col overflow-hidden shadow-2xl">
            <div class="px-4 py-3 bg-slate-800/60 border-b border-slate-800 flex items-center justify-between">
                <span id="modal-source-badge" class="text-[10px] font-black text-indigo-400 uppercase tracking-wider">Visualizador Seguro</span>
                <button onclick="closeReaderModal()" class="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white active:scale-90 transition-all">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex-1 w-full bg-white">
                <iframe id="news-frame" src="" class="w-full h-full border-0 bg-white" allow="geolocation"></iframe>
            </div>
        </div>
    </div>

    <!-- CODE INFRASTRUCTURE & BUSINESS LOGIC -->
    <script>
        // ID Base del Google Sheets y Mapeo Absoluto de GIDs para evitar cruces
        const SPREADSHEET_ID = "1u1Hey3bmvuU_MrO4NEQItXHquXFwRQjsxO7vsucEbh8"; 
        
        const SHEET_GIDS = {
            "Periodismo": "0",          
            "Tendencias": "123456789",  
            "Estrategia": "987654321",  
            "Materiales": "111213141",  
            "Mapas": "151617181"       
        };

        let currentSection = "Periodismo"; 
        let feedData = [];

        // Inicialización de componentes gráficos y carga
        document.addEventListener("DOMContentLoaded", () => {
            setupPWAComponents();
            lucide.createIcons();
            loadTaskCounter();
            fetchData();
        });

        function loadTaskCounter() {
            const count = localStorage.getItem('polis_tasks_done_total') || "0";
            document.getElementById('task-counter').innerText = count;
        }

        function markActionCompleted(id) {
            const key = `action_${currentSection}_${id}`;
            if (localStorage.getItem(key)) return;
            
            localStorage.setItem(key, "true");
            let total = parseInt(localStorage.getItem('polis_tasks_done_total') || "0") + 1;
            localStorage.setItem('polis_tasks_done_total', total.toString());
            
            loadTaskCounter();
            showToast("¡Objetivo registrado! 🌟");
            renderFeed(); 
        }

        async function fetchData() {
            const syncBtn = document.getElementById('sync-btn');
            if (syncBtn) syncBtn.classList.add('animate-spin');

            feedData = []; 
            const container = document.getElementById("feed-container");
            container.innerHTML = `<div class="text-center py-16 text-slate-500 text-xs animate-pulse">Sincronizando canal: ${currentSection}...</div>`;

            const gid = SHEET_GIDS[currentSection] || "0";

            try {
                // Fetch directo con prevención estricta de caché perimetral
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}&_ts=${Date.now()}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                
                const csvText = await response.text();
                feedData = parseCSVToJSON(csvText).sort((a, b) => parseInt(b.id || 0) - parseInt(a.id || 0));
                renderFeed();
            } catch (err) {
                container.innerHTML = `
                    <div class="text-center py-12 px-4 border border-rose-500/20 bg-rose-500/5 rounded-2xl">
                        <p class="text-rose-400 text-xs font-semibold">Error de enlace con la pestaña "${currentSection}"</p>
                        <p class="text-[10px] text-slate-500 mt-1">Verifica el ID, los permisos compartidos y que las columnas sean id, fuente, tematica, titulo, resumen, link.</p>
                    </div>`;
            } finally {
                if (syncBtn) syncBtn.classList.remove('animate-spin');
            }
        }

        function parseCSVToJSON(csvText) {
            const lines = []; let row = [""]; let inQuotes = false;
            for (let i = 0; i < csvText.length; i++) {
                let c = csvText[i]; let next = csvText[i+1];
                if (c === '"') { if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } else { inQuotes = !inQuotes; } }
                else if (c === ',' && !inQuotes) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !inQuotes) { if (c === '\r' && next === '\n') { i++; } lines.push(row); row = ['']; }
                else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row);
            if (lines.length <= 1) return [];

            // Sanitización de cabeceras seguras (XSS Shield)
            const headers = lines[0].map(h => h.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
            const jsonArray = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i]; if (line.length < headers.length) continue;
                const record = {}; let valid = false;
                headers.forEach((header, index) => {
                    const value = line[index] ? line[index].trim() : "";
                    record[header] = value;
                    if (header === "titulo" && value !== "") valid = true;
                });
                if (valid) jsonArray.push(record);
            }
            return jsonArray;
        }

        function renderFeed() {
            const container = document.getElementById("feed-container");
            container.innerHTML = "";
            const query = document.getElementById("search-bar").value.toLowerCase();

            const filtered = feedData.filter(item => {
                const title = (item.titulo || "").toLowerCase();
                const summary = (item.resumen || "").toLowerCase();
                const source = (item.fuente || "").toLowerCase();
                return title.includes(query) || summary.includes(query) || source.includes(query);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-slate-600 text-xs font-medium">No se encontraron registros activos en esta división.</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement("div");
                const id = item.id || Math.random();
                const title = item.titulo || "Sin título";
                const resumen = item.resumen || "";
                const fuente = item.fuente || "Mesa Operativa";
                const tematica = item.tematica || "Info";
                const link = item.link || "";
                const img = item.imagen || "";

                const key = `action_${currentSection}_${id}`;
                const isCompleted = localStorage.getItem(key);

                card.className = isCompleted 
                    ? "bg-slate-800/10 border border-slate-800/40 opacity-50 rounded-2xl p-4 flex flex-col space-y-3 transition-all" 
                    : "bg-slate-800/40 border border-slate-800/80 rounded-2xl p-4 flex flex-col space-y-3 shadow-md hover:border-slate-700 transition-all";

                let mediaHTML = img ? `<div class="w-full max-h-48 rounded-xl overflow-hidden border border-slate-700/40 bg-slate-900"><img src="${escapeHTML(img)}" class="w-full h-full object-cover" loading="lazy"></div>` : "";
                let actionArea = "";

                // Renderizado condicional inteligente por sección operativa
                if (currentSection === "Periodismo") {
                    actionArea = `
                        <div class="grid grid-cols-2 gap-2 pt-1">
                            <button onclick="openReaderModal('${escapeHTML(link)}', '${escapeHTML(fuente)}')" class="h-10 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                                <i data-lucide="eye" class="w-3.5 h-3.5"></i> Ver Reporte
                            </button>
                            <button onclick="copyToClipboard('${escapeHTML(link)}', '¡Enlace copiado al portapapeles!'); markActionCompleted('${id}')" class="h-10 rounded-xl bg-slate-800 text-slate-200 text-xs font-semibold flex items-center justify-center gap-1.5 border border-slate-700 active:scale-95 transition-all">
                                <i data-lucide="share" class="w-3.5 h-3.5"></i> Copiar Link
                            </button>
                        </div>
                    `;
                } else if (currentSection === "Tendencias") {
                    actionArea = `
                        <a href="${escapeHTML(link)}" target="_blank" rel="noopener noreferrer" onclick="markActionCompleted('${id}')" class="w-full h-10 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-xs font-bold flex items-center justify-center gap-2 active:scale-95 transition-all shadow-md shadow-indigo-600/10">
                            <i data-lucide="external-link" class="w-4 h-4"></i> Abrir en ${tematica}
                        </a>
                    `;
                } else if (currentSection === "Estrategia") {
                    let flyerBtn = img ? `
                        <button onclick="copyToClipboard('${escapeHTML(img)}', '¡Enlace del flyer listo!'); markActionCompleted('${id}')" class="w-full h-10 rounded-xl bg-indigo-600 text-white text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                            <i data-lucide="image" class="w-3.5 h-3.5"></i> Obtener Imagen
                        </button>
                    ` : "";
                    actionArea = `
                        <div class="flex flex-col space-y-2 pt-1">
                            ${flyerBtn}
                            <button onclick="copyToClipboard('${escapeHTML(resumen)}', 'Texto de asignación copiado.'); markActionCompleted('${id}')" class="w-full h-10 rounded-xl bg-slate-800 text-slate-300 text-xs font-semibold flex items-center justify-center gap-1.5 border border-slate-700 active:scale-95 transition-all">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copiar Guión / Tarea
                            </button>
                        </div>
                    `;
                } else if (currentSection === "Materiales") {
                    actionArea = `
                        <div class="grid grid-cols-2 gap-2 pt-1">
                            <a href="${escapeHTML(link)}" target="_blank" rel="noopener noreferrer" class="h-10 rounded-xl bg-slate-800 border border-slate-700 text-white text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                                <i data-lucide="cloud-download" class="w-3.5 h-3.5"></i> Descargar
                            </a>
                            <button onclick="copyToClipboard('${escapeHTML(link)}', 'Acceso copiado')" class="h-10 rounded-xl bg-slate-800 border border-slate-700 text-slate-300 text-xs font-semibold flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i> Compartir
                            </button>
                        </div>
                    `;
                } else if (currentSection === "Mapas") {
                    actionArea = `
                        <button onclick="openReaderModal('${escapeHTML(link)}', '${escapeHTML(fuente)}')" class="w-full h-11 rounded-xl bg-emerald-600 text-white text-xs font-bold flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg shadow-emerald-600/10">
                            <i data-lucide="map-pin" class="w-4 h-4"></i> Desplegar Coordenadas HMO
                        </button>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-indigo-400 tracking-wide">${escapeHTML(fuente)}</span>
                        <span class="text-[9px] font-black uppercase tracking-wider bg-slate-800 border border-slate-700 px-2 py-0.5 rounded-lg text-slate-400">${escapeHTML(tematica)}</span>
                    </div>
                    ${mediaHTML}
                    <div class="flex items-start justify-between gap-3">
                        <h2 class="text-sm font-bold text-white leading-snug flex-1">${escapeHTML(title)}</h2>
                        ${isCompleted ? `<span class="bg-emerald-500/20 text-emerald-400 text-[8px] font-bold px-1.5 py-0.5 rounded border border-emerald-500/20">Atendido</span>` : ''}
                    </div>
                    <p class="text-xs text-slate-400 leading-relaxed whitespace-pre-wrap">${escapeHTML(resumen)}</p>
                    ${actionArea}
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function copyToClipboard(text, msg) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => { showToast(msg); }).catch(() => {
                const t = document.createElement("textarea"); t.value = text;
                t.style.position = "fixed"; document.body.appendChild(t); t.select();
                document.execCommand('copy'); document.body.removeChild(t);
                showToast(msg);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            document.getElementById("toast-text").innerText = msg;
            toast.classList.remove("hidden");
            setTimeout(() => { toast.classList.add("hidden"); }, 2000);
        }

        function openReaderModal(url, fuente) {
            if(!url) return;
            document.getElementById("modal-source-badge").innerText = `Zona: ${fuente}`;
            document.getElementById("news-frame").src = url;
            document.getElementById("reader-modal").classList.remove("hidden");
        }
        
        function closeReaderModal() {
            document.getElementById("reader-modal").classList.add("hidden");
            document.getElementById("news-frame").src = "";
        }

        function switchTab(s) {
            currentSection = s;
            document.getElementById("current-tab-title").innerText = s;
            document.querySelectorAll(".section-nav").forEach(n => {
                if(n.getAttribute("data-section") === s) n.classList.replace("text-slate-400", "text-indigo-400");
                else n.classList.replace("text-indigo-400", "text-slate-400");
            });
            
            if (s === "Mapas") document.getElementById("search-container").classList.add("hidden");
            else document.getElementById("search-container").classList.remove("hidden");

            fetchData();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }

        // CONTROL AUTOMÁTICO DE ARCHIVOS COMPLEMENTARIOS PWA (Manifest & Service Worker Inline via Data URI)
        function setupPWAComponents() {
            const manifestObj = {
                "name": "AgoraPolis App",
                "short_name": "AgoraPolis",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#0f172a",
                "theme_color": "#0f172a",
                "orientation": "portrait",
                "icons": [
                    { "src": "https://cdn-icons-png.flaticon.com/512/11516/11516766.png", "sizes": "512xl512", "type": "image/png" }
                ]
            };
            const manifestStr = JSON.stringify(manifestObj);
            document.getElementById("pwa-manifest").setAttribute("href", "data:application/manifest+json;base64," + btoa(manifestStr));

            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'polis-v2';
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', e => {
                        if(e.request.mode === 'navigate') {
                            e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                        }
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log("SW Status: Local simulation mode"));
            }
        }
    </script>
</body>
</html>
