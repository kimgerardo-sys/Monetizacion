<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgoraPolis - Campañas & Coyuntura</title>
    
    <!-- Meta tags nativos PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Manifest en línea -->
    <link rel="manifest" href="data:application/json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJlcyIsCiAgIm5hbWUiOiAiQWdvcmFQb2xpcyBNZWRpb3MiLAogICJzaG9ydF9uYW1lIjogIkFnb3JhUG9saXMiLAogICJkZXNjcmlwdGlvbiI6ICJIdWIgZGUgcGVyaW9kaXNtbyBpbmRlcGVuZGllbnRlIHkgYXNlc29yw61hIHBvbMOtdGljYSIsCiAgInN0YW5kYWxvbmUiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTcyYSIsCiAgInRoZW1lX2NvbG9yIjogIiMwZjE3MmEiLAogICpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2ltZy5pY29uczguY29tL2ZsdWVudHkvNTEyL2dvdmVybm1lbnQucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">

    <!-- CDNs estables -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-nav {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col pb-24 antialiased">

    <!-- HEADER SUPERIOR -->
    <header class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-slate-800 px-4 py-3.5">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-600 flex items-center justify-center border border-indigo-500/30 shadow-lg shadow-indigo-500/20">
                    <i data-lucide="megaphone" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-tight text-white">AgoraPolis</h1>
                    <p class="text-[10px] text-indigo-400 font-bold tracking-wider uppercase">Operación & Estrategia</p>
                </div>
            </div>
            <!-- Botón Sincronizar de 44x44px táctil -->
            <button id="sync-btn" onclick="fetchData()" class="w-11 h-11 rounded-xl bg-slate-800/80 hover:bg-slate-800 border border-slate-700 flex items-center justify-center transition-all active:scale-95" aria-label="Sincronizar datos">
                <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-300"></i>
            </button>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="flex-1 max-w-md w-full mx-auto px-4 pt-24 space-y-5">
        
        <!-- BUSCADOR CON DEBOUNCE IMPLÍCITO -->
        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i data-lucide="search" class="w-4 h-4 text-slate-500"></i>
            </span>
            <input type="text" id="search-bar" oninput="renderFeed()" placeholder="Buscar aviso, medio o palabra clave..." 
                class="w-full h-12 pl-10 pr-4 bg-slate-800/40 border border-slate-800 rounded-xl text-sm placeholder-slate-500 text-white focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
        </div>

        <!-- FILTROS POR PLATAFORMA / TIPO (Thumb-friendly scrolling) -->
        <div class="flex gap-2 overflow-x-auto hide-scrollbar py-1">
            <button onclick="setPlatformFilter('all')" class="platform-tab px-4 h-9 rounded-xl text-xs font-semibold whitespace-nowrap transition-all bg-indigo-600 text-white" data-platform="all">
                Todo el flujo
            </button>
            <button onclick="setPlatformFilter('Aviso')" class="platform-tab px-4 h-9 rounded-xl text-xs font-semibold whitespace-nowrap transition-all bg-slate-800 text-slate-400 border border-slate-800/60" data-platform="Aviso">
                <i data-lucide="alert-circle" class="w-3.5 h-3.5 inline mr-1"></i> Avisos / Invitaciones
            </button>
            <button onclick="setPlatformFilter('Web')" class="platform-tab px-4 h-9 rounded-xl text-xs font-semibold whitespace-nowrap transition-all bg-slate-800 text-slate-400 border border-slate-800/60" data-platform="Web">
                <i data-lucide="globe" class="w-3.5 h-3.5 inline mr-1"></i> Portales
            </button>
            <button onclick="setPlatformFilter('Newsletter')" class="platform-tab px-4 h-9 rounded-xl text-xs font-semibold whitespace-nowrap transition-all bg-slate-800 text-slate-400 border border-slate-800/60" data-platform="Newsletter">
                <i data-lucide="mail" class="w-3.5 h-3.5 inline mr-1"></i> Newsletters
            </button>
            <button onclick="setPlatformFilter('X')" class="platform-tab px-4 h-9 rounded-xl text-xs font-semibold whitespace-nowrap transition-all bg-slate-800 text-slate-400 border border-slate-800/60" data-platform="X">
                <i data-lucide="twitter" class="w-3.5 h-3.5 inline mr-1"></i> X (Twitter)
            </button>
        </div>

        <!-- CONTENEDOR DE TARJETAS -->
        <div id="feed-container" class="space-y-4">
            <!-- Esqueleto de carga -->
            <div class="animate-pulse space-y-4">
                <div class="h-36 bg-slate-800/40 rounded-xl border border-slate-800"></div>
                <div class="h-36 bg-slate-800/40 rounded-xl border border-slate-800"></div>
            </div>
        </div>
    </main>

    <!-- NAVEGACIÓN INFERIOR (ZONA DEL PULGAR - Mínimo 44px) -->
    <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-800/80 z-50">
        <div class="max-w-md mx-auto flex justify-around items-center h-20">
            <button onclick="switchTab('Periodismo')" class="section-nav flex flex-col items-center justify-center w-20 h-14 text-indigo-400" data-section="Periodismo">
                <i data-lucide="newspaper" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Periodismo</span>
            </button>
            <button onclick="switchTab('Analisis')" class="section-nav flex flex-col items-center justify-center w-20 h-14 text-slate-400" data-section="Analisis">
                <i data-lucide="pie-chart" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Análisis</span>
            </button>
            <button onclick="switchTab('Consultoria')" class="section-nav flex flex-col items-center justify-center w-20 h-14 text-slate-400" data-section="Consultoria">
                <i data-lucide="users" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Asesores</span>
            </button>
        </div>
    </nav>

    <!-- LÓGICA JAVASCRIPT MASTER -->
    <script>
        // URL de tu implementación de Google Apps Script (Colocar aquí al enlazar a producción)
        const API_URL = "https://script.google.com/macros/s/AKfycbwG17OG-MIZTVxUhNNTpkh38k-0aeKDr3NPhfbBYJsYF20ftBaT_86C4iFyxRN2MXcXQg/exec"; 

        let currentSection = "Periodismo";
        let currentPlatform = "all";
        let feedData = [];

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            fetchData();
        });

        async function fetchData() {
            const syncBtn = document.getElementById('sync-btn');
            if (syncBtn) syncBtn.classList.add('animate-spin');

            const cache = localStorage.getItem(`polis_camp_cache_${currentSection}`);
            if (cache) {
                feedData = JSON.parse(cache);
                renderFeed();
            }

            if (!API_URL) {
                setTimeout(() => {
                    feedData = getCampaignMockData(currentSection);
                    localStorage.setItem(`polis_camp_cache_${currentSection}`, JSON.stringify(feedData));
                    renderFeed();
                    if (syncBtn) syncBtn.classList.remove('animate-spin');
                }, 600);
                return;
            }

            try {
                const response = await fetch(`${API_URL}?seccion=${currentSection}`);
                if (!response.ok) throw new Error("Error en red");
                const data = await response.json();
                if (Array.isArray(data)) {
                    feedData = data;
                    localStorage.setItem(`polis_camp_cache_${currentSection}`, JSON.stringify(feedData));
                    renderFeed();
                }
            } catch (err) {
                console.error("Modo local o fuera de línea activo:", err);
            } finally {
                if (syncBtn) syncBtn.classList.remove('animate-spin');
            }
        }

        function renderFeed() {
            const container = document.getElementById("feed-container");
            container.innerHTML = "";
            const searchVal = document.getElementById("search-bar").value.toLowerCase();

            const filtered = feedData.filter(item => {
                const platformMatch = (currentPlatform === "all" || item.tematica.trim() === currentPlatform);
                const searchMatch = item.titulo.toLowerCase().includes(searchVal) || 
                                    item.resumen.toLowerCase().includes(searchVal) ||
                                    item.fuente.toLowerCase().includes(searchVal);
                return platformMatch && searchMatch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-slate-600 text-center">
                        <i data-lucide="folder-open" class="w-8 h-8 mb-2 stroke-[1.5]"></i>
                        <p class="text-xs font-medium">Sin contenido o avisos registrados en esta sección.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement("div");
                const pfm = item.tematica.trim();
                
                // Sanitización estricta anti-XSS
                const cleanTitle = escapeHTML(item.titulo);
                const cleanResumen = escapeHTML(item.resumen);
                const cleanFuente = escapeHTML(item.fuente);
                const cleanLink = encodeURI(item.link || "");
                const cleanImg = item.imagen ? encodeURI(item.imagen.trim()) : "";

                // Cambiar el estilo visual completo si es un aviso importante del equipo
                if (pfm === "Aviso") {
                    card.className = "bg-gradient-to-br from-amber-500/10 to-orange-500/5 border border-amber-500/30 rounded-xl p-4 flex flex-col space-y-3 relative overflow-hidden shadow-md shadow-amber-500/5";
                } else {
                    card.className = "bg-slate-800/30 border border-slate-800/80 rounded-xl p-4 flex flex-col space-y-3 transition-all";
                }

                // Configuración de Badges e Iconos según temática
                let platformIcon = "globe";
                let badgeStyle = "bg-slate-800 text-slate-300 border-slate-700";

                if (pfm === "Aviso") { platformIcon = "alert-circle"; badgeStyle = "bg-amber-500/20 text-amber-400 border-amber-500/30"; }
                else if (pfm === "X") { platformIcon = "twitter"; badgeStyle = "bg-sky-500/10 text-sky-400 border-sky-500/20"; }
                else if (pfm === "Instagram") { platformIcon = "instagram"; badgeStyle = "bg-pink-500/10 text-pink-400 border-pink-500/20"; }
                else if (pfm === "Facebook") { platformIcon = "facebook"; badgeStyle = "bg-blue-500/10 text-blue-400 border-blue-500/20"; }
                else if (pfm === "Newsletter") { platformIcon = "mail"; badgeStyle = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20"; }

                // Lógica de inyección de imagen / flyer
                let imageHTML = "";
                if (cleanImg) {
                    imageHTML = `<div class="w-full max-h-48 rounded-lg overflow-hidden border border-slate-700/50 bg-slate-900 flex items-center justify-center">
                                    <img src="${cleanImg}" alt="Flyer Informativo" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.style.display='none'">
                                 </div>`;
                }

                // Condicional para renderizar el botón de acción si existe link válido
                let actionButtonHTML = "";
                if (cleanLink && cleanLink !== "undefined" && cleanLink !== "") {
                    let buttonText = "Analizar fuente original";
                    if (pfm === "Newsletter") buttonText = "Leer newsletter corporativo";
                    if (pfm === "Aviso") buttonText = "Confirmar asistencia / Ver enlace";
                    
                    actionButtonHTML = `
                        <a href="${cleanLink}" target="_blank" rel="noopener noreferrer" 
                           class="w-full h-11 rounded-lg bg-slate-800 hover:bg-indigo-600 text-white text-xs font-semibold flex items-center justify-center gap-2 border border-slate-700/50 transition-all active:scale-95">
                            ${buttonText} <i data-lucide="arrow-up-right" class="w-3.5 h-3.5"></i>
                        </a>
                    `;
                }

                card.innerHTML = `
                    <div class="space-y-2.5">
                        <div class="flex items-center justify-between">
                            <span class="text-[11px] font-bold text-indigo-400 uppercase tracking-wider">${cleanFuente}</span>
                            <span class="flex items-center gap-1 text-[10px] font-bold border px-2 py-0.5 rounded-md ${badgeStyle}">
                                <i data-lucide="${platformIcon}" class="w-3 h-3"></i> ${pfm}
                            </span>
                        </div>
                        ${imageHTML}
                        <h2 class="text-sm font-bold text-white leading-snug">${cleanTitle}</h2>
                        <p class="text-xs text-slate-400 leading-relaxed">${cleanResumen}</p>
                    </div>
                    ${actionButtonHTML}
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function setPlatformFilter(platform) {
            currentPlatform = platform;
            document.querySelectorAll(".platform-tab").forEach(tab => {
                if(tab.getAttribute("data-platform") === platform) {
                    tab.className = "platform-tab px-4 h-9 rounded-xl text-xs font-semibold whitespace-nowrap transition-all bg-indigo-600 text-white";
                } else {
                    tab.className = "platform-tab px-4 h-9 rounded-xl text-xs font-semibold whitespace-nowrap transition-all bg-slate-800 text-slate-400 border border-slate-800/60";
                }
            });
            renderFeed();
        }

        function switchTab(section) {
            currentSection = section;
            document.querySelectorAll(".section-nav").forEach(nav => {
                if(nav.getAttribute("data-section") === section) {
                    nav.classList.replace("text-slate-400", "text-indigo-400");
                } else {
                    nav.classList.replace("text-indigo-400", "text-slate-400");
                }
            });
            fetchData();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }

        // Simulación local de datos mixtos (Avisos institucionales, imágenes y links)
        function getCampaignMockData(sec) {
            const mock = {
                Periodismo: [
                    { id: 101, titulo: "¡CONVOCATORIA ABIERTA! Laboratorio de Comunicación Política Juvenil", tematica: "Aviso", fuente: "Coordinación", resumen: "Atención equipo y jóvenes interesados: este jueves cerramos registros para el taller intensivo de Media Training. No requiere link externo, asistan directo a la sala b del instituto.", link: "", imagen: "https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=500&auto=format&fit=crop&q=60" },
                    { id: 102, titulo: "Lanzamiento oficial de la plataforma de monitoreo independiente", tematica: "Newsletter", fuente: "Agora Newsletter", resumen: "En nuestra edición número 14 desglosamos las pautas clave para vigilar la transparencia presupuestal en redes sociales estatales.", link: "https://google.com", imagen: "" }
                ],
                Analisis: [
                    { id: 201, titulo: "URGENTE: Reunión de análisis de métricas digitales del mes", tematica: "Aviso", fuente: "Estrategia", resumen: "Miembros del equipo de campaña: Nos vemos a las 5:00 PM vía Zoom para revisar los picos de interacción del último debate de jóvenes.", link: "https://zoom.us", imagen: "" },
                    { id: 202, titulo: "Infografía: Consumo de medios digitales en jóvenes de 18 a 29 años", tematica: "Instagram", fuente: "@DataElectoral_Son", resumen: "Los datos arrojan que el 74% prefiere formatos de video vertical de menos de 30 segundos sobre propuestas públicas.", link: "https://instagram.com", imagen: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=500&auto=format&fit=crop&q=60" }
                ],
                Consultoria: [
                    { id: 301, titulo: "Manual de Activismo Digital y Campañas Limpias para Equipos de Tierra", tematica: "Web", fuente: "Manuales ABC", resumen: "Documento indispensable de consulta rápida sobre ética comunicativa y contrarrestración de rumores en territorio.", link: "https://google.com", imagen: "" }
                ]
            };
            return mock[sec] || [];
        }
    </script>

    <!-- SERVICE WORKER INTERNO -->
    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'agora-camp-cache-v1';
                const ASSETS = [ '/', '/index.html', 'https://cdn.tailwindcss.com', 'https://unpkg.com/lucide@latest' ];
                self.addEventListener('install', (e) => { e.waitUntil(caches.open(CACHE_NAME).then((c) => c.addAll(ASSETS))); });
                self.addEventListener('fetch', (e) => { e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request))); });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('SW Fail:', err));
        }
    </script>
</body>
</html>
