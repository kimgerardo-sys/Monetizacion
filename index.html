<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgoraPolis Búnker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" id="pwa-manifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        .glass-header { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }

    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col pb-24 antialiased">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-[70] bg-slate-900 flex flex-col justify-center items-center px-6 transition-opacity duration-300">
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
            <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-indigo-600/20 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-[10%] -right-[10%] w-[60%] h-[60%] bg-purple-600/20 blur-[120px] rounded-full"></div>
        </div>

        <div class="w-full max-w-sm bg-slate-800/60 border border-slate-700/50 rounded-3xl p-8 shadow-2xl backdrop-blur-xl relative z-10">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center border border-indigo-500/30 shadow-lg shadow-indigo-500/20">
                    <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-white text-center mb-2 tracking-tight">Acceso Búnker</h2>
            <p class="text-xs text-slate-400 text-center mb-8 font-medium">Autenticación segura de miembros.</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">Nombre Completo</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="text" id="login-name" class="w-full h-12 bg-slate-900/50 border border-slate-700/80 rounded-xl pl-10 pr-4 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">Celular</label>
                    <div class="relative">
                        <i data-lucide="phone" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="tel" id="login-phone" class="w-full h-12 bg-slate-900/50 border border-slate-700/80 rounded-xl pl-10 pr-4 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                </div>
                <button id="login-btn" onclick="attemptLogin()" class="w-full h-12 mt-6 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg border border-indigo-500/50">
                    <span>Ingresar</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
                <p id="login-error" class="text-rose-400 text-[11px] text-center font-semibold mt-4 hidden bg-rose-500/10 border border-rose-500/20 py-2 rounded-lg"></p>
            </div>
        </div>
    </div>


    <!-- MODAL MENSAJE DEL DÍA (Línea del Día) -->
    <div id="motd-modal" class="hidden fixed inset-0 z-[60] bg-slate-950/95 backdrop-blur-md flex flex-col justify-center items-center px-4">
        <div class="bg-slate-800 border border-indigo-500/30 w-full max-w-sm rounded-3xl p-6 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/20 blur-[50px] rounded-full pointer-events-none"></div>
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30">
                    <i data-lucide="megaphone" class="w-5 h-5 text-indigo-400"></i>
                </div>
                <div>
                    <h3 class="text-white font-bold text-lg leading-tight">La Línea del Día</h3>
                    <p class="text-indigo-400 text-[10px] font-bold uppercase tracking-wider">Instrucción Prioritaria</p>
                </div>
            </div>
            
            <div class="bg-slate-900/50 border border-slate-700/50 rounded-xl p-4 mb-6">
                <p id="motd-text" class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap"></p>
                <a id="motd-link" href="#" target="_blank" class="hidden mt-3 text-indigo-400 hover:text-indigo-300 text-xs font-bold flex items-center gap-1">
                    <i data-lucide="link" class="w-3.5 h-3.5"></i> Abrir Enlace Adjunto
                </a>
            </div>
            
            <button id="motd-btn-enterado" class="w-full h-12 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg shadow-indigo-600/20">
                <i data-lucide="check-square" class="w-4 h-4"></i> Enterado
            </button>
        </div>
    </div>


    <!-- CABECERA -->
    <header class="fixed top-0 left-0 right-0 z-40 glass-header border-b border-slate-800/60 px-4 py-3.5">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center border border-indigo-500/20 shadow-lg shadow-indigo-500/10">
                    <i data-lucide="shield" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-tight text-white leading-tight">AgoraPolis</h1>
                    <p id="current-tab-title" class="text-[10px] text-indigo-400 font-bold tracking-wider uppercase leading-none mt-0.5">Periodismo</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="btn-header-mensaje" class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700/80 flex items-center justify-center active:scale-95 transition-all hover:bg-slate-700">
                    <i data-lucide="megaphone" class="w-4 h-4 text-indigo-400"></i>
                </button>
                <div class="bg-slate-800/80 border border-slate-700/50 rounded-xl px-3 h-10 flex items-center gap-2 shadow-inner">
                    <i data-lucide="star" class="w-4 h-4 text-amber-400 fill-amber-400"></i>
                    <div class="text-left">
                        <p class="text-[8px] font-bold text-slate-400 uppercase leading-none">Puntos</p>
                        <p id="task-counter" class="text-xs font-black text-white leading-none mt-0.5">0</p>
                    </div>
                </div>
                <button id="sync-btn" onclick="fetchData()" class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700/80 flex items-center justify-center active:scale-95 transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-300"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="toast" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 z-[80] bg-slate-800/95 text-emerald-400 text-xs font-bold px-4 py-3 rounded-xl shadow-2xl border border-emerald-500/30 flex items-center gap-2 transition-all backdrop-blur-md">
        <i data-lucide="check-circle" class="w-4 h-4"></i> <span id="toast-text">Completado</span>
    </div>

    <!-- BOTÓN SOS FLOTANTE -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdXg10XVS7HIvLWc1Dg3CV_89ibuD38Ft4eR4gTwKKgRCPnjA/viewform?usp=header" target="_blank" 
       class="fixed bottom-20 right-4 z-50 w-14 h-14 bg-gradient-to-tr from-rose-600 to-rose-500 rounded-full shadow-lg shadow-rose-600/40 flex flex-col items-center justify-center border border-rose-400 hover:scale-105 active:scale-95 transition-transform sos-pulse">
        <i data-lucide="siren" class="w-6 h-6 text-white mb-0.5"></i>
        <span class="text-[8px] font-black text-white uppercase leading-none tracking-widest">SOS</span>
    </a>

    <main class="flex-1 max-w-xl w-full mx-auto px-4 pt-24 space-y-4">
        <div id="welcome-card" class="bg-indigo-600/10 border border-indigo-500/20 rounded-2xl p-4 flex items-center justify-between mb-2">
            <div>
                <div class="flex items-center gap-2 mb-0.5">
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider">Miembro Activo</p>
                    <span id="user-level-badge" class="bg-indigo-500/20 text-indigo-300 text-[9px] font-black px-1.5 py-0.5 rounded border border-indigo-500/30 uppercase">Nivel 1</span>
                </div>
                <h3 id="user-display-name" class="text-sm font-bold text-white">Agente</h3>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-white transition-colors bg-slate-800 p-2 rounded-lg border border-slate-700">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
        </div>

        <div id="search-container" class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i data-lucide="search" class="w-4 h-4 text-slate-500"></i>
            </span>
            <input type="text" id="search-bar" oninput="renderFeed()" placeholder="Buscar reportes o palabras clave..." 
                class="w-full h-11 pl-10 pr-4 bg-slate-800/40 border border-slate-800 rounded-xl text-sm placeholder-slate-500 text-white focus:outline-none focus:border-indigo-500 transition-all">
        </div>

        <div id="feed-container" class="space-y-4">
            <div class="animate-pulse space-y-4">
                <div class="h-32 bg-slate-800/40 rounded-2xl border border-slate-800"></div>
            </div>
        </div>
    </main>

    <!-- NAVEGACIÓN -->
    <nav class="fixed bottom-0 left-0 right-0 glass-header border-t border-slate-800/60 z-40 px-2 shadow-2xl">
        <div class="max-w-xl mx-auto flex justify-around items-center h-16">
            <button onclick="switchTab('Periodismo')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-indigo-400" data-section="Periodismo">
                <i data-lucide="newspaper" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Periodismo</span>
            </button>
            <button onclick="switchTab('Tendencias')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-slate-400" data-section="Tendencias">
                <i data-lucide="trending-up" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Tendencias</span>
            </button>
            <button onclick="switchTab('Estrategia')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-slate-400" data-section="Estrategia">
                <i data-lucide="zap" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Estrategia</span>
            </button>
            <button onclick="switchTab('Materiales')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-slate-400" data-section="Materiales">
                <i data-lucide="folder" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Materiales</span>
            </button>
            <button onclick="switchTab('Mapas')" class="section-nav flex flex-col items-center justify-center flex-1 h-full text-slate-400" data-section="Mapas">
                <i data-lucide="map" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-tight">Mapas</span>
            </button>
        </div>
    </nav>

    <div id="reader-modal" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-md flex flex-col justify-end sm:justify-center p-0">
        <div class="bg-slate-900 w-full max-w-xl mx-auto h-[92vh] rounded-t-3xl border-t border-slate-800 flex flex-col overflow-hidden shadow-2xl">
            <div class="px-4 py-3 bg-slate-800/60 border-b border-slate-800 flex items-center justify-between">
                <span id="modal-source-badge" class="text-[10px] font-black text-indigo-400 uppercase tracking-wider">Visualizador</span>
                <button onclick="closeReaderModal()" class="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white active:scale-90 transition-all">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex-1 w-full bg-white relative">
                <iframe id="news-frame" src="" class="w-full h-full border-0 bg-white" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
            </div>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script>
        // 🚨 PEGA AQUÍ TU NUEVA URL DEL GOOGLE APPS SCRIPT 🚨
        const API_URL = "https://script.google.com/macros/s/AKfycbx3ImLmqnL20__4UGl7aEak-WmDAgi0k05mrKZDDxQdYh0AoFIEt57hRJ1VKzSgVaaWcA/exec"; 

        let currentSection = "Periodismo"; 
        let feedData = [];

        document.addEventListener("DOMContentLoaded", () => {
            setupPWAComponents();
            lucide.createIcons();
            
            const session = localStorage.getItem("polis_session");
            if (session) {
                document.getElementById("login-screen").classList.add("hidden");
                const userObj = JSON.parse(session);
                document.getElementById("user-display-name").innerText = userObj.nombre;
                
                loadTaskCounter();
                fetchData();
                fetchMensajeDelDia(); 
            } else {
                document.getElementById("login-screen").classList.remove("hidden");
            }
        });

        async function attemptLogin() {
            const name = document.getElementById("login-name").value;
            const phone = document.getElementById("login-phone").value;
            const errorMsg = document.getElementById("login-error");
            const btn = document.getElementById("login-btn");

            if (!name || !phone) {
                errorMsg.innerText = "Por favor llena ambos campos.";
                errorMsg.classList.remove("hidden");
                return;
            }

            if (API_URL.includes("LA_URL_AQUI")) {
                errorMsg.innerText = "Error: Falta configurar la URL de la API en tu código.";
                errorMsg.classList.remove("hidden");
                return;
            }

            errorMsg.classList.add("hidden");
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Verificando...`;
            lucide.createIcons();
            btn.disabled = true;

            try {
                const url = `${API_URL}?action=login&nombre=${encodeURIComponent(name)}&celular=${encodeURIComponent(phone)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Error conectando con la base de datos.");
                const result = await response.json();

                if (result.error) throw new Error(result.error);

                localStorage.setItem("polis_session", JSON.stringify(result.user));
                document.getElementById("user-display-name").innerText = result.user.nombre;
                
                document.getElementById("login-screen").classList.add("hidden");
                showToast(`¡Acceso Autorizado!`);
                loadTaskCounter();
                fetchData();
                fetchMensajeDelDia();

            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Ingresar</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>`;
                lucide.createIcons();
            }
        }

        function logout() {
            localStorage.removeItem("polis_session");
            document.getElementById("feed-container").innerHTML = "";
            document.getElementById("login-name").value = "";
            document.getElementById("login-phone").value = "";
            document.getElementById("login-screen").classList.remove("hidden");
        }

        async function fetchMensajeDelDia() {
            if (API_URL.includes("LA_URL_AQUI")) return;
            try {
                const url = `${API_URL}?action=mensaje`;
                const response = await fetch(url);
                if (!response.ok) return;
                
                const data = await response.json();
                if (data.error || !data.id) return;
                
                document.getElementById('motd-text').innerText = data.mensaje;
                if(data.link) {
                    document.getElementById('motd-link').href = data.link;
                    document.getElementById('motd-link').classList.remove('hidden');
                } else {
                    document.getElementById('motd-link').classList.add('hidden');
                }
                
                const lastRead = localStorage.getItem('polis_last_message_read');
                const btnEnterado = document.getElementById('motd-btn-enterado');
                
                if (lastRead !== data.id) {
                    document.getElementById('motd-modal').classList.remove('hidden');
                    btnEnterado.onclick = () => {
                        localStorage.setItem('polis_last_message_read', data.id);
                        document.getElementById('motd-modal').classList.add('hidden');
                    };
                }
                
                document.getElementById('btn-header-mensaje').onclick = () => {
                    document.getElementById('motd-modal').classList.remove('hidden');
                    btnEnterado.onclick = () => {
                        document.getElementById('motd-modal').classList.add('hidden');
                    };
                };
                
            } catch(err) {
                console.log("Error cargando mensaje:", err);
            }
        }

        function loadTaskCounter() {
            const total = parseInt(localStorage.getItem('polis_tasks_done_total') || "0");
            document.getElementById('task-counter').innerText = total;
            
            const nivel = Math.floor(total / 5) + 1;
            document.getElementById('user-level-badge').innerText = `Nivel ${nivel}`;
        }

        function markActionCompleted(id) {
            const key = `action_${currentSection}_${id}`;
            if (localStorage.getItem(key)) return;
            
            localStorage.setItem(key, "true");
            let total = parseInt(localStorage.getItem('polis_tasks_done_total') || "0") + 1;
            localStorage.setItem('polis_tasks_done_total', total.toString());
            
            loadTaskCounter();
            showToast("¡Objetivo registrado! 🌟");
            renderFeed(); 
        }

        async function fetchData() {
            const syncBtn = document.getElementById('sync-btn');
            if (syncBtn) syncBtn.classList.add('animate-spin');

            feedData = []; 
            const container = document.getElementById("feed-container");
            container.innerHTML = `<div class="text-center py-16 text-slate-500 text-xs animate-pulse">Sincronizando: ${currentSection}...</div>`;

            if (API_URL.includes("LA_URL_AQUI")) {
                container.innerHTML = `<div class="text-center py-12 px-4 border border-amber-500/20 bg-amber-500/5 rounded-2xl"><p class="text-amber-400 text-xs font-semibold">Falta el enlace a la API</p></div>`;
                if (syncBtn) syncBtn.classList.remove('animate-spin');
                return;
            }

            try {
                const url = `${API_URL}?action=feed&section=${encodeURIComponent(currentSection)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                
                const result = await response.json();
                if (result.error) throw new Error(result.error);
                
                feedData = result.sort((a, b) => parseInt(b.id || 0) - parseInt(a.id || 0));
                renderFeed();
            } catch (err) {
                container.innerHTML = `<div class="text-center py-12 px-4 border border-rose-500/20 bg-rose-500/5 rounded-2xl"><p class="text-rose-400 text-xs font-semibold">Error al obtener "${currentSection}"</p><p class="text-[10px] text-slate-500 mt-2">${err.message}</p></div>`;
            } finally {
                if (syncBtn) syncBtn.classList.remove('animate-spin');
            }
        }

        function renderFeed() {
            const container = document.getElementById("feed-container");
            container.innerHTML = "";
            const query = document.getElementById("search-bar").value.toLowerCase();

            const filtered = feedData.filter(item => {
                const title = (item.titulo || "").toLowerCase();
                const summary = (item.resumen || "").toLowerCase();
                const source = (item.fuente || "").toLowerCase();
                return title.includes(query) || summary.includes(query) || source.includes(query);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-slate-600 text-xs font-medium">Sin instrucciones activas.</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement("div");
                const id = item.id || Math.random();
                const title = item.titulo || "Sin título";
                const resumen = item.resumen || "";
                const fuente = item.fuente || "Estrategia Central";
                const tematica = item.tematica || "Info";
                const link = item.link || "";
                const img = item.imagen || "";

                const key = `action_${currentSection}_${id}`;
                const isCompleted = localStorage.getItem(key);

                card.className = isCompleted 
                    ? "bg-slate-800/10 border border-slate-800/40 opacity-50 rounded-2xl p-4 flex flex-col space-y-3 transition-all" 
                    : "bg-slate-800/40 border border-slate-800/80 rounded-2xl p-4 flex flex-col space-y-3 shadow-md hover:border-slate-700 transition-all";

                let imgClass = currentSection === "Materiales" ? "w-full h-48 object-contain bg-slate-950" : "w-full h-48 object-cover";
                let mediaHTML = img ? `<div class="w-full rounded-xl overflow-hidden border border-slate-700/40 bg-slate-900"><img src="${escapeHTML(img)}" class="${imgClass}" loading="lazy"></div>` : "";
                
                let actionArea = "";

                if (currentSection === "Periodismo") {
                    let shareText = `*${escapeHTML(title)}*\n\n${escapeHTML(resumen)}\n\n🔗 ${escapeHTML(link)}`;
                    actionArea = `
                        <div class="grid grid-cols-2 gap-2 pt-1">
                            <button onclick="openReaderModal('${escapeHTML(link)}', '${escapeHTML(fuente)}')" class="h-10 rounded-xl bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                                <i data-lucide="eye" class="w-3.5 h-3.5"></i> Leer Nota
                            </button>
                            <button onclick="copyToClipboard(\`${shareText}\`, 'Nota copiada lista para WhatsApp'); markActionCompleted('${id}')" class="h-10 rounded-xl bg-indigo-600 text-white text-xs font-bold flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copiar Resumen
                            </button>
                        </div>
                    `;
                } else if (currentSection === "Tendencias") {
                    actionArea = `
                        <div class="flex flex-col space-y-2 pt-1">
                            <div class="flex gap-2">
                                <button onclick="copyToClipboard('${escapeHTML(resumen)}', 'Hashtags / Slogan copiados'); markActionCompleted('${id}')" class="flex-1 h-10 rounded-xl bg-slate-800 text-slate-300 text-[10px] font-bold flex items-center justify-center gap-1.5 border border-slate-700 active:scale-95 transition-all">
                                    <i data-lucide="hash" class="w-3.5 h-3.5"></i> Copiar Hashtags
                                </button>
                                <button onclick="copyToClipboard('${escapeHTML(title)}', 'Mensaje sugerido copiado'); markActionCompleted('${id}')" class="flex-1 h-10 rounded-xl bg-slate-800 text-slate-300 text-[10px] font-bold flex items-center justify-center gap-1.5 border border-slate-700 active:scale-95 transition-all">
                                    <i data-lucide="message-square" class="w-3.5 h-3.5"></i> Mensaje Oficial
                                </button>
                            </div>
                            <a href="${escapeHTML(link)}" target="_blank" onclick="markActionCompleted('${id}')" class="w-full h-11 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-xs font-bold flex items-center justify-center gap-2 active:scale-95 transition-all shadow-md">
                                <i data-lucide="external-link" class="w-4 h-4"></i> Ir a Interactuar
                            </a>
                        </div>
                    `;
                } else if (currentSection === "Estrategia") {
                    actionArea = `
                        <div class="flex flex-col space-y-2 pt-1">
                            <a href="${escapeHTML(link)}" target="_blank" onclick="markActionCompleted('${id}')" class="w-full h-11 rounded-xl bg-emerald-600 text-white text-xs font-bold flex items-center justify-center gap-2 active:scale-95 transition-all shadow-md shadow-emerald-600/20">
                                <i data-lucide="map-pin" class="w-4 h-4"></i> Abrir Ubicación / Evento
                            </a>
                            <button onclick="copyToClipboard('${escapeHTML(resumen)}', 'Instrucciones copiadas.'); markActionCompleted('${id}')" class="w-full h-10 rounded-xl bg-slate-800 text-slate-300 text-[10px] font-bold flex items-center justify-center gap-1.5 border border-slate-700 active:scale-95 transition-all">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copiar Instrucciones
                            </button>
                        </div>
                    `;
                } else if (currentSection === "Materiales") {
                    actionArea = `
                        <div class="grid grid-cols-2 gap-2 pt-1">
                            <a href="${escapeHTML(link)}" target="_blank" download class="h-10 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-bold flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                                <i data-lucide="download-cloud" class="w-3.5 h-3.5"></i> Descargar
                            </a>
                            <button onclick="copyToClipboard('${escapeHTML(link)}', 'Enlace de material copiado'); markActionCompleted('${id}')" class="h-10 rounded-xl bg-slate-800 border border-slate-700 text-slate-300 text-[11px] font-bold flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                                <i data-lucide="link" class="w-3.5 h-3.5"></i> Copiar Link
                            </button>
                        </div>
                    `;
                } else if (currentSection === "Mapas") {
                    actionArea = `
                        <a href="${escapeHTML(link)}" target="_blank" onclick="markActionCompleted('${id}')" class="w-full h-11 rounded-xl bg-emerald-600 text-white text-xs font-bold flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg shadow-emerald-600/20">
                            <i data-lucide="map" class="w-4 h-4"></i> Abrir App de Mapas
                        </a>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-bold text-indigo-400 tracking-wide">${escapeHTML(fuente)}</span>
                        <span class="text-[9px] font-black uppercase tracking-wider bg-slate-800 border border-slate-700 px-2 py-0.5 rounded-lg text-slate-400">${escapeHTML(tematica)}</span>
                    </div>
                    ${mediaHTML}
                    <div class="flex items-start justify-between gap-3 mt-2">
                        <h2 class="text-sm font-bold text-white leading-snug flex-1">${escapeHTML(title)}</h2>
                        ${isCompleted ? `<span class="bg-emerald-500/20 text-emerald-400 text-[8px] font-bold px-1.5 py-0.5 rounded border border-emerald-500/20">Atendido</span>` : ''}
                    </div>
                    <p class="text-xs text-slate-400 leading-relaxed whitespace-pre-wrap">${escapeHTML(resumen)}</p>
                    ${actionArea}
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function copyToClipboard(text, msg) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => { showToast(msg); }).catch(() => {
                const t = document.createElement("textarea"); t.value = text;
                t.style.position = "fixed"; document.body.appendChild(t); t.select();
                document.execCommand('copy'); document.body.removeChild(t);
                showToast(msg);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            document.getElementById("toast-text").innerText = msg;
            toast.classList.remove("hidden");
            setTimeout(() => { toast.classList.add("hidden"); }, 2000);
        }

        function openReaderModal(url, fuente) {
            if(!url) return;
            document.getElementById("modal-source-badge").innerText = `Fuente: ${fuente}`;
            document.getElementById("news-frame").src = url;
            document.getElementById("reader-modal").classList.remove("hidden");
        }
        
        function closeReaderModal() {
            document.getElementById("reader-modal").classList.add("hidden");
            document.getElementById("news-frame").src = "";
        }

        function switchTab(s) {
            currentSection = s;
            document.getElementById("current-tab-title").innerText = s;
            document.querySelectorAll(".section-nav").forEach(n => {
                if(n.getAttribute("data-section") === s) n.classList.replace("text-slate-400", "text-indigo-400");
                else n.classList.replace("text-indigo-400", "text-slate-400");
            });
            
            if (s === "Mapas") document.getElementById("search-container").classList.add("hidden");
            else document.getElementById("search-container").classList.remove("hidden");

            fetchData();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }

        function setupPWAComponents() {
            const manifestObj = {
                "name": "AgoraPolis Búnker",
                "short_name": "Búnker",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#0f172a",
                "theme_color": "#0f172a",
                "orientation": "portrait",
                "icons": [
                    { "src": "https://cdn-icons-png.flaticon.com/512/11516/11516766.png", "sizes": "512xl512", "type": "image/png" }
                ]
            };
            const manifestStr = JSON.stringify(manifestObj);
            document.getElementById("pwa-manifest").setAttribute("href", "data:application/manifest+json;base64," + btoa(manifestStr));

            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'polis-v3';
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', e => {
                        if(e.request.mode === 'navigate') {
                            e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                        }
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log("SW Status: Local mode"));
            }
        }
    </script>
</body>
</html>
